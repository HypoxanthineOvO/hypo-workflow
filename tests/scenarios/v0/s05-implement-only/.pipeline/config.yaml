pipeline:
  name: "System Test S05"
  source: local
  output: local

execution:
  mode: self
  steps:
    preset: implement-only
  step_overrides:
    run_tests:
      strict: true

evaluation:
  auto_continue: false
  max_diff_score: 3
  checks:
    - tests_pass
    - no_regressions
    - matches_plan
    - code_quality
