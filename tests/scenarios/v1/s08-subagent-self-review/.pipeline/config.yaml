pipeline:
  name: "System Test S08"
  source: local
  output: local

execution:
  mode: subagent
  subagent_tool: auto
  steps:
    preset: tdd

step_overrides:
  review_tests:
    reviewer: subagent
  review_code:
    reviewer: subagent

evaluation:
  auto_continue: false
  max_diff_score: 3
  checks:
    - tests_pass
    - no_regressions
    - matches_plan
    - code_quality
