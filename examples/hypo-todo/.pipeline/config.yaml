pipeline:
  name: "Hypo-TODO"
  source: local
  output: local

execution:
  mode: self
  steps:
    preset: tdd
  step_overrides:
    run_tests_red:
      strict: true
    run_tests_green:
      strict: true

evaluation:
  auto_continue: false
  max_diff_score: 3
  checks:
    - tests_pass
    - no_regressions
    - matches_plan
    - code_quality
