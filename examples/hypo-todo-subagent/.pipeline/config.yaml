pipeline:
  name: "Hypo-TODO Subagent"
  source: local
  output: local
  prompts_dir: "../hypo-todo/.pipeline/prompts"

execution:
  mode: subagent
  subagent_tool: auto
  steps:
    preset: tdd

step_overrides:
  review_tests:
    reviewer: subagent
  review_code:
    reviewer: subagent

evaluation:
  auto_continue: false
  max_diff_score: 3
  checks:
    - tests_pass
    - no_regressions
    - matches_plan
    - code_quality
