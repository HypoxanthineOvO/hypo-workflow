$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.local/hypo-workflow/config.schema.yaml"
title: Prompt Pipeline Config Schema
description: Strict schema for Prompt Pipeline V7 configuration.
$defs:
  global_config:
    title: Hypo-Workflow Global Config Schema
    description: Schema for ~/.hypo-workflow/config.yaml generated by /hypo-workflow:setup.
    type: object
    additionalProperties: false
    required:
      - agent
      - execution
      - subagent
      - dashboard
      - plan
      - version
      - created
      - updated
    properties:
      agent:
        type: object
        additionalProperties: false
        required:
          - platform
          - model
        properties:
          platform:
            type: string
            enum:
              - claude-code
              - codex
          model:
            type: string
            minLength: 1
      execution:
        type: object
        additionalProperties: false
        required:
          - default_mode
        properties:
          default_mode:
            type: string
            enum:
              - self
              - subagent
            default: self
      subagent:
        type: object
        additionalProperties: false
        required:
          - provider
        properties:
          provider:
            type: string
            enum:
              - codex
              - claude
            default: codex
          codex:
            type: object
            additionalProperties: false
            properties:
              model:
                type: string
                minLength: 1
                default: gpt-5.4
              base_url:
                type: string
                minLength: 1
          claude:
            type: object
            additionalProperties: false
            properties:
              model:
                type: string
                minLength: 1
                default: claude-sonnet-4-20250514
      dashboard:
        type: object
        additionalProperties: false
        required:
          - enabled
          - port
        properties:
          enabled:
            type: boolean
            default: true
          port:
            type: integer
            minimum: 1
            maximum: 65535
            default: 7700
      output:
        type: object
        additionalProperties: false
        properties:
          language:
            type: string
            minLength: 1
            default: en
          timezone:
            type: string
            minLength: 1
            default: UTC
        default:
          language: en
          timezone: UTC
      watchdog:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          interval:
            type: integer
            minimum: 1
            default: 300
          heartbeat_timeout:
            type: integer
            minimum: 1
            default: 300
          max_retries:
            type: integer
            minimum: 1
            default: 5
          max_consecutive_milestones:
            type: integer
            minimum: 1
            default: 10
          notify:
            type: boolean
            default: true
        default:
          enabled: false
          interval: 300
          heartbeat_timeout: 300
          max_retries: 5
          max_consecutive_milestones: 10
          notify: true
      history_import:
        type: object
        additionalProperties: false
        properties:
          split_method:
            type: string
            enum:
              - auto
              - tag
              - keyword
              - merge
              - time_gap
            default: auto
          time_gap_threshold:
            type: string
            pattern: "^[0-9]+[hmd]$"
            default: 24h
          max_milestones:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
          keyword_patterns:
            type: array
            minItems: 1
            default:
              - 'feat\(M(\d+)\):'
              - 'M(\d+)-'
              - 'milestone-(\d+)'
            items:
              type: string
              minLength: 1
        default:
          split_method: auto
          time_gap_threshold: 24h
          max_milestones: 20
          keyword_patterns:
            - 'feat\(M(\d+)\):'
            - 'M(\d+)-'
            - 'milestone-(\d+)'
      compact:
        type: object
        additionalProperties: false
        properties:
          auto:
            type: boolean
            default: true
          progress_recent:
            type: integer
            minimum: 1
            default: 15
          state_history_full:
            type: integer
            minimum: 0
            default: 1
          log_recent:
            type: integer
            minimum: 1
            default: 20
          reports_summary_lines:
            type: integer
            minimum: 1
            default: 3
        default:
          auto: true
          progress_recent: 15
          state_history_full: 1
          log_recent: 20
          reports_summary_lines: 3
      showcase:
        type: object
        additionalProperties: false
        properties:
          language:
            type: string
            enum:
              - auto
              - zh
              - en
              - bilingual
            default: auto
          poster:
            type: object
            additionalProperties: false
            properties:
              api_key_env:
                type: string
                minLength: 1
                default: OPENAI_API_KEY
              size:
                type: string
                enum:
                  - "1024x1024"
                  - "1024x1536"
                  - "1536x1024"
                default: "1024x1536"
              quality:
                type: string
                enum:
                  - high
                  - standard
                default: high
              style:
                type: string
                enum:
                  - auto
                  - minimal
                  - tech
                  - marketing
                default: auto
            default:
              api_key_env: OPENAI_API_KEY
              size: "1024x1536"
              quality: high
              style: auto
        default:
          language: auto
          poster:
            api_key_env: OPENAI_API_KEY
            size: "1024x1536"
            quality: high
            style: auto
      plan:
        type: object
        additionalProperties: false
        required:
          - default_mode
        properties:
          default_mode:
            type: string
            enum:
              - interactive
              - auto
            default: interactive
          interaction_depth:
            type: string
            enum:
              - low
              - medium
              - high
            default: medium
          interactive:
            type: object
            additionalProperties: false
            properties:
              min_rounds:
                type: integer
                minimum: 1
                default: 3
              require_explicit_confirm:
                type: boolean
                default: true
            default:
              min_rounds: 3
              require_explicit_confirm: true
      version:
        type: string
        pattern: "^(7\\.1\\.0|8\\.0\\.0|8\\.1\\.0|8\\.2\\.0|8\\.3\\.0)$"
      created:
        type: string
        minLength: 1
      updated:
        type: string
        minLength: 1
type: object
additionalProperties: false
required:
  - pipeline
  - evaluation
properties:
  platform:
    type: string
    enum:
      - auto
      - claude
      - codex
    default: auto
    description: |
      指定目标平台。auto = 运行时检测。
      影响 Hook 可用性、Subagent 调用方式、指令文件位置。
  plan:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - auto
          - interactive
        default: interactive
      interaction_depth:
        type: string
        enum:
          - low
          - medium
          - high
        default: medium
      interactive:
        type: object
        additionalProperties: false
        properties:
          min_rounds:
            type: integer
            minimum: 1
            default: 3
          require_explicit_confirm:
            type: boolean
            default: true
        default:
          min_rounds: 3
          require_explicit_confirm: true
    default:
      mode: interactive
      interaction_depth: medium
      interactive:
        min_rounds: 3
        require_explicit_confirm: true
  dashboard:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 7700
      auto_start:
        type: boolean
        default: false
      shutdown_delay:
        type: integer
        minimum: 0
        default: 30
    default:
      enabled: false
      port: 7700
      auto_start: false
      shutdown_delay: 30
  pipeline:
    type: object
    additionalProperties: false
    required:
      - name
      - source
      - output
    properties:
      name:
        type: string
        minLength: 1
        description: Human-readable pipeline name.
      source:
        type: string
        enum:
          - local
          - notion
        description: Prompt source adapter. V2.5 runtime guarantees local support.
      output:
        type: string
        enum:
          - local
          - notion
        description: Output adapter. V2.5 runtime guarantees local support.
      prompts_dir:
        type: string
        minLength: 1
        default: ".pipeline/prompts"
      reports_dir:
        type: string
        minLength: 1
        default: ".pipeline/reports"
      state_file:
        type: string
        minLength: 1
        default: ".pipeline/state.yaml"
      log_file:
        type: string
        minLength: 1
        default: ".pipeline/log.md"
  execution:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - self
          - subagent
        default: self
        description: Execution mode. V3 keeps self and subagent.
      subagent_tool:
        type: string
        enum:
          - codex
          - claude
          - auto
        default: auto
      steps:
        type: object
        additionalProperties: false
        properties:
          preset:
            type: string
            enum:
              - tdd
              - implement-only
              - custom
            default: tdd
          sequence:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
        default:
          preset: tdd
      step_overrides:
        type: object
        default: {}
        propertyNames:
          pattern: "^[A-Za-z0-9_-]+$"
        additionalProperties:
          type: object
          additionalProperties: false
          properties:
            enabled:
              type: boolean
              default: true
            reviewer:
              type: string
              enum:
                - self
                - subagent
              default: self
            executor:
              type: string
              enum:
                - self
                - subagent
              default: self
            subagent_tool:
              type: string
              enum:
                - codex
                - claude
                - auto
            subagent:
              type: string
              enum:
                - codex
                - claude
                - auto
            strict:
              type: boolean
              default: false
    default:
      mode: self
      subagent_tool: auto
      steps:
        preset: tdd
  output:
    type: object
    additionalProperties: false
    properties:
      language:
        type: string
        minLength: 1
        default: en
        description: Report and PROGRESS language. Use zh-CN for Chinese output.
      timezone:
        type: string
        minLength: 1
        default: UTC
        description: IANA timezone used for PROGRESS and report timestamps.
    default:
      language: en
      timezone: UTC
  watchdog:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      interval:
        type: integer
        minimum: 1
        default: 300
      heartbeat_timeout:
        type: integer
        minimum: 1
        default: 300
      max_retries:
        type: integer
        minimum: 1
        default: 5
      max_consecutive_milestones:
        type: integer
        minimum: 1
        default: 10
      notify:
        type: boolean
        default: true
    default:
      enabled: false
      interval: 300
      heartbeat_timeout: 300
      max_retries: 5
      max_consecutive_milestones: 10
      notify: true
  history_import:
    type: object
    additionalProperties: false
    properties:
      split_method:
        type: string
        enum:
          - auto
          - tag
          - keyword
          - merge
          - time_gap
        default: auto
      time_gap_threshold:
        type: string
        pattern: "^[0-9]+[hmd]$"
        default: 24h
      max_milestones:
        type: integer
        minimum: 1
        maximum: 20
        default: 20
      keyword_patterns:
        type: array
        minItems: 1
        default:
          - 'feat\(M(\d+)\):'
          - 'M(\d+)-'
          - 'milestone-(\d+)'
        items:
          type: string
          minLength: 1
    default:
      split_method: auto
      time_gap_threshold: 24h
      max_milestones: 20
      keyword_patterns:
        - 'feat\(M(\d+)\):'
        - 'M(\d+)-'
        - 'milestone-(\d+)'
  compact:
    type: object
    additionalProperties: false
    properties:
      auto:
        type: boolean
        default: true
      progress_recent:
        type: integer
        minimum: 1
        default: 15
      state_history_full:
        type: integer
        minimum: 0
        default: 1
      log_recent:
        type: integer
        minimum: 1
        default: 20
      reports_summary_lines:
        type: integer
        minimum: 1
        default: 3
    default:
      auto: true
      progress_recent: 15
      state_history_full: 1
      log_recent: 20
      reports_summary_lines: 3
  showcase:
    type: object
    additionalProperties: false
    properties:
      language:
        type: string
        enum:
          - auto
          - zh
          - en
          - bilingual
        default: auto
      poster:
        type: object
        additionalProperties: false
        properties:
          api_key_env:
            type: string
            minLength: 1
            default: OPENAI_API_KEY
          size:
            type: string
            enum:
              - "1024x1024"
              - "1024x1536"
              - "1536x1024"
            default: "1024x1536"
          quality:
            type: string
            enum:
              - high
              - standard
            default: high
          style:
            type: string
            enum:
              - auto
              - minimal
              - tech
              - marketing
            default: auto
        default:
          api_key_env: OPENAI_API_KEY
          size: "1024x1536"
          quality: high
          style: auto
    default:
      language: auto
      poster:
        api_key_env: OPENAI_API_KEY
        size: "1024x1536"
        quality: high
        style: auto
  step_overrides:
    type: object
    default: {}
    propertyNames:
      pattern: "^[A-Za-z0-9_-]+$"
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          default: true
        reviewer:
          type: string
          enum:
            - self
            - subagent
          default: self
        executor:
          type: string
          enum:
            - self
            - subagent
          default: self
        subagent_tool:
          type: string
          enum:
            - codex
            - claude
            - auto
        subagent:
          type: string
          enum:
            - codex
            - claude
            - auto
        strict:
          type: boolean
          default: false
  hooks:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      stop_check:
        type: boolean
        default: true
      session_inject:
        type: boolean
        default: true
      instructions_monitor:
        type: boolean
        default: false
      claude:
        type: object
        additionalProperties: false
        properties:
          stop_block_mode:
            type: string
            enum:
              - strict
              - lenient
            default: strict
          compact_reinject:
            type: boolean
            default: true
      codex:
        type: object
        additionalProperties: false
        properties:
          notify_on_complete:
            type: boolean
            default: true
          agents_md_discipline:
            type: boolean
            default: true
  evaluation:
    type: object
    additionalProperties: false
    properties:
      auto_continue:
        type: boolean
        default: false
      max_diff_score:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
      adaptive_threshold:
        type: boolean
        default: false
      base_max_diff_score:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
      checks:
        type: array
        default:
          - tests_pass
          - no_regressions
          - matches_plan
          - code_quality
        uniqueItems: true
        items:
          type: string
          enum:
            - tests_pass
            - no_regressions
            - matches_plan
            - code_quality
      weights:
        type: object
        description: 可自定义各维度权重，默认使用内置公式
        additionalProperties: false
        properties:
          diff_score:
            type: number
          code_quality:
            type: number
          test_coverage:
            type: number
          complexity:
            type: number
          architecture_drift:
            type: number
  notion:
    type: object
    additionalProperties: false
    properties:
      token_file:
        type: string
        minLength: 1
        description: Path to a file containing the Notion integration token.
      source_database_id:
        type: string
        minLength: 1
      source_page_id:
        type: string
        minLength: 1
      output_parent_page_id:
        type: string
        minLength: 1
      output_database_id:
        type: string
        minLength: 1
      report_title_prefix:
        type: string
        minLength: 1
      api_base_url:
        type: string
        minLength: 1
        default: "https://api.notion.com/v1"
      notion_version:
        type: string
        minLength: 1
        default: "2022-06-28"
allOf:
  - if:
      properties:
        execution:
          properties:
            steps:
              properties:
                preset:
                  const: custom
              required:
                - preset
          required:
            - steps
      required:
        - execution
    then:
      properties:
        execution:
          properties:
            steps:
              required:
                - sequence
  - if:
      properties:
        pipeline:
          properties:
            source:
              const: notion
      required:
        - pipeline
    then:
      properties:
        notion:
          anyOf:
            - required:
                - source_database_id
            - required:
                - source_page_id
  - if:
      properties:
        pipeline:
          properties:
            output:
              const: notion
      required:
        - pipeline
    then:
      properties:
        notion:
          anyOf:
            - required:
                - output_parent_page_id
            - required:
                - output_database_id
