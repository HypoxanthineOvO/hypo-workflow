$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://example.local/hypo-workflow/config.schema.yaml"
title: Prompt Pipeline Config Schema
description: Strict schema for Prompt Pipeline V7 configuration.
$defs:
  opencode_agent_model:
    type: object
    additionalProperties: false
    required:
      - model
    properties:
      model:
        type: string
        minLength: 1
  claude_agent_model:
    type: object
    additionalProperties: false
    required:
      - model
    properties:
      model:
        type: string
        minLength: 1
  claude_code_config:
    type: object
    additionalProperties: false
    description: "Claude Code adapter contract; includes settings.local_file and compact.inject_resume_context defaults."
    properties:
      profile:
        type: string
        enum:
          - developer
          - standard
          - strict
        default: standard
      model:
        type: string
        minLength: 1
        default: deepseek-v4-pro
      api:
        type: object
        additionalProperties: false
        description: "Project-local Claude Code API override. Values are rendered into settings env as ANTHROPIC_* variables."
        properties:
          base_url:
            type: string
            minLength: 1
          base_url_env:
            type: string
            minLength: 1
            description: "Read the Anthropic-compatible base URL from this environment variable during sync."
          api_key:
            type: string
            minLength: 1
          api_key_env:
            type: string
            minLength: 1
            description: "Read the API key from this environment variable during sync, then write it into project-local Claude settings."
        default: {}
      settings:
        type: object
        additionalProperties: false
        description: "settings.local_file controls the project-local Claude settings merge target."
        properties:
          local_file:
            type: string
            minLength: 1
            default: .claude/settings.local.json
          backup:
            type: boolean
            default: true
          managed_marker:
            type: string
            minLength: 1
            default: hypo-workflow
        default:
          local_file: .claude/settings.local.json
          backup: true
          managed_marker: hypo-workflow
      hooks:
        type: object
        additionalProperties: false
        properties:
          stop:
            type: object
            additionalProperties: false
            properties:
              block_on_missing_state:
                type: boolean
                default: true
              block_on_missing_log:
                type: boolean
                default: true
              block_on_missing_progress:
                type: boolean
                default: true
              block_on_missing_report:
                type: boolean
                default: true
              warn_on_metrics_gap:
                type: boolean
                default: true
              warn_on_derived_gap:
                type: boolean
                default: true
          compact:
            type: object
            additionalProperties: false
            description: "compact.inject_resume_context keeps Claude Code aligned after context compaction."
            properties:
              inject_resume_context:
                type: boolean
                default: true
          permission:
            type: object
            additionalProperties: false
            properties:
              follow_effective_config:
                type: boolean
                default: true
      status:
        type: object
        additionalProperties: false
        properties:
          surface:
            type: string
            enum:
              - auto
              - monitor
              - skill
              - dashboard
            default: auto
          fallback_order:
            type: array
            items:
              type: string
              minLength: 1
            default:
              - monitor
              - hw-status
              - session-summary
              - dashboard
      agents:
        type: object
        additionalProperties: false
        properties:
          plan:
            $ref: "#/$defs/claude_agent_model"
          code:
            $ref: "#/$defs/claude_agent_model"
          test:
            $ref: "#/$defs/claude_agent_model"
          review:
            $ref: "#/$defs/claude_agent_model"
          debug:
            $ref: "#/$defs/claude_agent_model"
          docs:
            $ref: "#/$defs/claude_agent_model"
          report:
            $ref: "#/$defs/claude_agent_model"
          compact:
            $ref: "#/$defs/claude_agent_model"
  opencode_provider_model:
    type: object
    additionalProperties: true
    properties:
      name:
        type: string
        minLength: 1
      limit:
        type: object
        additionalProperties: true
      modalities:
        type: object
        additionalProperties: true
  opencode_provider:
    type: object
    additionalProperties: true
    properties:
      npm:
        type: string
        minLength: 1
      name:
        type: string
        minLength: 1
      options:
        type: object
        additionalProperties: true
      models:
        type: object
        additionalProperties:
          $ref: "#/$defs/opencode_provider_model"
  model_pool_role:
    type: object
    additionalProperties: false
    required:
      - primary
    properties:
      primary:
        type: string
        minLength: 1
      fallback:
        type: array
        default: []
        items:
          type: string
          minLength: 1
  model_pool_config:
    type: object
    additionalProperties: false
    properties:
      roles:
        type: object
        additionalProperties: false
        properties:
          plan:
            $ref: "#/$defs/model_pool_role"
          implement:
            $ref: "#/$defs/model_pool_role"
          review:
            $ref: "#/$defs/model_pool_role"
          evaluate:
            $ref: "#/$defs/model_pool_role"
          chat:
            $ref: "#/$defs/model_pool_role"
  acceptance_config:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - auto
          - confirm
          - manual
          - timeout
        default: auto
      require_user_confirm:
        type: boolean
        default: false
      default_state:
        type: string
        enum:
          - pending
          - accepted
          - rejected
        default: pending
      timeout_hours:
        type: number
        exclusiveMinimum: 0
        default: 72
      reject_escalation_threshold:
        type: integer
        minimum: 1
        default: 3
  sync_config:
    type: object
    additionalProperties: false
    properties:
      project_registry:
        type: string
        minLength: 1
        default: ~/.hypo-workflow/projects.yaml
      register_projects:
        type: boolean
        default: true
      platforms:
        type: object
        additionalProperties: false
        properties:
          opencode:
            type: object
            additionalProperties: false
            properties:
              profile:
                type: string
                minLength: 1
                default: standard
              auto_continue:
                type: boolean
                default: true
              auto_continue_mode:
                type: string
                enum:
                  - ask
                  - safe
                  - aggressive
                default: safe
  analysis_boundary_value:
    type: string
    enum:
      - allow
      - confirm
      - ask
      - deny
  analysis_mode_boundary:
    oneOf:
      - $ref: "#/$defs/analysis_boundary_value"
      - type: object
        additionalProperties: false
        properties:
          manual:
            $ref: "#/$defs/analysis_boundary_value"
          hybrid:
            $ref: "#/$defs/analysis_boundary_value"
          auto:
            $ref: "#/$defs/analysis_boundary_value"
  analysis_interaction:
    type: object
    additionalProperties: false
    properties:
      interaction_mode:
        type: string
        enum:
          - manual
          - hybrid
          - auto
        default: hybrid
      boundaries:
        type: object
        additionalProperties: false
        properties:
          code_changes:
            $ref: "#/$defs/analysis_mode_boundary"
          restart_services:
            $ref: "#/$defs/analysis_mode_boundary"
          install_system_dependencies:
            $ref: "#/$defs/analysis_mode_boundary"
          network_remote_resources:
            $ref: "#/$defs/analysis_mode_boundary"
          destructive_or_external_side_effects:
            $ref: "#/$defs/analysis_mode_boundary"
        default:
          code_changes:
            manual: deny
            hybrid: confirm
            auto: allow
          restart_services: confirm
          install_system_dependencies: ask
          network_remote_resources:
            manual: ask
            hybrid: ask
            auto: allow
          destructive_or_external_side_effects: ask
    default:
      interaction_mode: hybrid
      boundaries:
        code_changes:
          manual: deny
          hybrid: confirm
          auto: allow
        restart_services: confirm
        install_system_dependencies: ask
        network_remote_resources:
          manual: ask
          hybrid: ask
          auto: allow
        destructive_or_external_side_effects: ask
  knowledge_config:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: true
      root:
        type: string
        minLength: 1
        default: .pipeline/knowledge
      loading:
        type: object
        additionalProperties: false
        properties:
          session_start:
            type: boolean
            default: true
          compact:
            type: boolean
            default: true
          indexes:
            oneOf:
              - type: boolean
              - type: array
                items:
                  type: string
                  enum:
                    - dependencies
                    - references
                    - pitfalls
                    - decisions
                    - config-notes
                    - secret-refs
            default:
              - dependencies
              - references
              - pitfalls
              - decisions
              - config-notes
              - secret-refs
          records:
            type: boolean
            default: false
        default:
          session_start: true
          compact: true
          indexes:
            - dependencies
            - references
            - pitfalls
            - decisions
            - config-notes
            - secret-refs
          records: false
      compaction:
        type: object
        additionalProperties: false
        properties:
          auto:
            type: boolean
            default: true
          max_records_per_category:
            type: integer
            minimum: 1
            default: 50
          compact_file:
            type: string
            minLength: 1
            default: .pipeline/knowledge/knowledge.compact.md
        default:
          auto: true
          max_records_per_category: 50
          compact_file: .pipeline/knowledge/knowledge.compact.md
      redaction:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: true
          replacement:
            type: string
            minLength: 1
            default: "[REDACTED]"
          secret_keys:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
            default:
              - api_key
              - token
              - secret
              - password
              - authorization
              - access_token
              - refresh_token
              - client_secret
        default:
          enabled: true
          replacement: "[REDACTED]"
          secret_keys:
            - api_key
            - token
            - secret
            - password
            - authorization
            - access_token
            - refresh_token
            - client_secret
      strictness:
        type: object
        additionalProperties: false
        properties:
          invalid_record:
            type: string
            enum:
              - off
              - warn
              - error
              - block
            default: warn
          missing_index:
            type: string
            enum:
              - off
              - warn
              - error
              - block
            default: warn
          secret_leak:
            type: string
            enum:
              - warn
              - error
              - block
            default: error
        default:
          invalid_record: warn
          missing_index: warn
          secret_leak: error
    default:
      enabled: true
      root: .pipeline/knowledge
      loading:
        session_start: true
        compact: true
        indexes:
          - dependencies
          - references
          - pitfalls
          - decisions
          - config-notes
          - secret-refs
        records: false
      compaction:
        auto: true
        max_records_per_category: 50
        compact_file: .pipeline/knowledge/knowledge.compact.md
      redaction:
        enabled: true
        replacement: "[REDACTED]"
        secret_keys:
          - api_key
          - token
          - secret
          - password
          - authorization
          - access_token
          - refresh_token
          - client_secret
      strictness:
        invalid_record: warn
        missing_index: warn
        secret_leak: error
  global_config:
    title: Hypo-Workflow Global Config Schema
    description: Schema for ~/.hypo-workflow/config.yaml generated by /hypo-workflow:setup.
    type: object
    additionalProperties: false
    required:
      - agent
      - execution
      - subagent
      - dashboard
      - plan
      - version
      - created
      - updated
    properties:
      agent:
        type: object
        additionalProperties: false
        required:
          - platform
          - model
        properties:
          platform:
            type: string
            enum:
              - claude-code
              - codex
          model:
            type: string
            minLength: 1
      execution:
        type: object
        additionalProperties: false
        required:
          - default_mode
        properties:
          default_mode:
            type: string
            enum:
              - self
              - subagent
            default: self
          analysis:
            $ref: "#/$defs/analysis_interaction"
            default:
              interaction_mode: hybrid
              boundaries:
                code_changes:
                  manual: deny
                  hybrid: confirm
                  auto: allow
                restart_services: confirm
                install_system_dependencies: ask
                network_remote_resources:
                  manual: ask
                  hybrid: ask
                  auto: allow
                destructive_or_external_side_effects: ask
          test_profiles:
            type: object
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                default: true
              selection:
                type: string
                enum:
                  - auto
                  - manual
                default: auto
              compose:
                type: boolean
                default: true
              profiles:
                type: array
                default: []
                items:
                  type: string
                  enum:
                    - webapp
                    - agent-service
                    - research
            default:
              enabled: true
              selection: auto
              compose: true
              profiles: []
      subagent:
        type: object
        additionalProperties: false
        required:
          - provider
        properties:
          provider:
            type: string
            enum:
              - codex
              - claude
            default: codex
          codex:
            type: object
            additionalProperties: false
            properties:
              model:
                type: string
                minLength: 1
                default: gpt-5.4
              base_url:
                type: string
                minLength: 1
          claude:
            type: object
            additionalProperties: false
            properties:
              model:
                type: string
                minLength: 1
                default: claude-sonnet-4-20250514
      model_pool:
        $ref: "#/$defs/model_pool_config"
      acceptance:
        $ref: "#/$defs/acceptance_config"
      dashboard:
        type: object
        additionalProperties: false
        required:
          - enabled
          - port
        properties:
          enabled:
            type: boolean
            default: true
          port:
            type: integer
            minimum: 1
            maximum: 65535
            default: 7700
      output:
        type: object
        additionalProperties: false
        properties:
          language:
            type: string
            minLength: 1
            default: en
          timezone:
            type: string
            minLength: 1
            default: Asia/Shanghai
        default:
          language: zh-CN
          timezone: Asia/Shanghai
      opencode:
        type: object
        additionalProperties: false
        properties:
          auto_continue:
            type: boolean
            default: true
          profile:
            type: string
            minLength: 1
            default: standard
          providers:
            type: object
            additionalProperties:
              $ref: "#/$defs/opencode_provider"
          compaction:
            type: object
            additionalProperties: false
            properties:
              effective_context_target:
                type: integer
                minimum: 1
                default: 900000
            default:
              effective_context_target: 900000
          agents:
            type: object
            additionalProperties: false
            properties:
              plan:
                $ref: "#/$defs/opencode_agent_model"
              compact:
                $ref: "#/$defs/opencode_agent_model"
              test:
                $ref: "#/$defs/opencode_agent_model"
              code-a:
                $ref: "#/$defs/opencode_agent_model"
              code-b:
                $ref: "#/$defs/opencode_agent_model"
              debug:
                $ref: "#/$defs/opencode_agent_model"
              docs:
                $ref: "#/$defs/opencode_agent_model"
              report:
                $ref: "#/$defs/opencode_agent_model"
            default:
              plan:
                model: gpt-5.5
              compact:
                model: deepseek-v4-flash
              test:
                model: deepseek-v4-pro
              code-a:
                model: mimo-v2.5-pro
              code-b:
                model: deepseek-v4-pro
              debug:
                model: gpt-5.5
              docs:
                model: deepseek-v4-pro
              report:
                model: deepseek-v4-flash
        default:
          auto_continue: true
          profile: standard
          compaction:
            effective_context_target: 900000
          agents:
            plan:
              model: gpt-5.5
            compact:
              model: deepseek-v4-flash
            test:
              model: deepseek-v4-pro
            code-a:
              model: mimo-v2.5-pro
            code-b:
              model: deepseek-v4-pro
            debug:
              model: gpt-5.5
            docs:
              model: deepseek-v4-pro
            report:
              model: deepseek-v4-flash
      claude_code:
        $ref: "#/$defs/claude_code_config"
      release:
        type: object
        additionalProperties: false
        properties:
          readme:
            type: object
            additionalProperties: false
            properties:
              mode:
                type: string
                enum:
                  - loose
                  - strict
                default: loose
              full_regen:
                type: string
                enum:
                  - auto
                  - ask
                  - deny
                default: auto
            default:
              mode: loose
              full_regen: auto
        default:
          readme:
            mode: loose
            full_regen: auto
      batch:
        type: object
        additionalProperties: false
        properties:
          decompose_mode:
            type: string
            enum:
              - upfront
              - just_in_time
            default: upfront
          failure_policy:
            type: string
            enum:
              - stop
              - skip_defer
              - retry
            default: skip_defer
          auto_chain:
            type: boolean
            default: true
          default_gate:
            type: string
            enum:
              - auto
              - confirm
            default: auto
        default:
          decompose_mode: upfront
          failure_policy: skip_defer
          auto_chain: true
          default_gate: auto
      watchdog:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          interval:
            type: integer
            minimum: 1
            default: 300
          heartbeat_timeout:
            type: integer
            minimum: 1
            default: 300
          max_retries:
            type: integer
            minimum: 1
            default: 5
          max_consecutive_milestones:
            type: integer
            minimum: 1
            default: 10
          notify:
            type: boolean
            default: true
        default:
          enabled: false
          interval: 300
          heartbeat_timeout: 300
          max_retries: 5
          max_consecutive_milestones: 10
          notify: true
      history_import:
        type: object
        additionalProperties: false
        properties:
          split_method:
            type: string
            enum:
              - auto
              - tag
              - keyword
              - merge
              - time_gap
            default: auto
          time_gap_threshold:
            type: string
            pattern: "^[0-9]+[hmd]$"
            default: 24h
          max_milestones:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
          keyword_patterns:
            type: array
            minItems: 1
            default:
              - 'feat\(M(\d+)\):'
              - 'M(\d+)-'
              - 'milestone-(\d+)'
            items:
              type: string
              minLength: 1
        default:
          split_method: auto
          time_gap_threshold: 24h
          max_milestones: 20
          keyword_patterns:
            - 'feat\(M(\d+)\):'
            - 'M(\d+)-'
            - 'milestone-(\d+)'
      compact:
        type: object
        additionalProperties: false
        properties:
          auto:
            type: boolean
            default: true
          progress_recent:
            type: integer
            minimum: 1
            default: 15
          state_history_full:
            type: integer
            minimum: 0
            default: 1
          log_recent:
            type: integer
            minimum: 1
            default: 20
          reports_summary_lines:
            type: integer
            minimum: 1
            default: 3
        default:
          auto: true
          progress_recent: 15
          state_history_full: 1
          log_recent: 20
          reports_summary_lines: 3
      knowledge:
        $ref: "#/$defs/knowledge_config"
      sync:
        $ref: "#/$defs/sync_config"
      showcase:
        type: object
        additionalProperties: false
        properties:
          language:
            type: string
            enum:
              - auto
              - zh
              - en
              - bilingual
            default: auto
          poster:
            type: object
            additionalProperties: false
            properties:
              api_key_env:
                type: string
                minLength: 1
                default: OPENAI_API_KEY
              size:
                type: string
                enum:
                  - "1024x1024"
                  - "1024x1536"
                  - "1536x1024"
                default: "1024x1536"
              quality:
                type: string
                enum:
                  - high
                  - standard
                default: high
              style:
                type: string
                enum:
                  - auto
                  - minimal
                  - tech
                  - marketing
                default: auto
            default:
              api_key_env: OPENAI_API_KEY
              size: "1024x1536"
              quality: high
              style: auto
        default:
          language: auto
          poster:
            api_key_env: OPENAI_API_KEY
            size: "1024x1536"
            quality: high
            style: auto
      rules:
        type: object
        additionalProperties: false
        properties:
          extends:
            oneOf:
              - type: string
                minLength: 1
                default: recommended
              - type: array
                minItems: 1
                items:
                  type: string
                  minLength: 1
            default: recommended
          rules:
            type: object
            default: {}
            propertyNames:
              pattern: "^[a-z0-9][a-z0-9-]*$"
            additionalProperties:
              type: string
              enum:
                - off
                - warn
                - error
        default:
          extends: recommended
          rules: {}
      plan:
        type: object
        additionalProperties: false
        required:
          - default_mode
        properties:
          default_mode:
            type: string
            enum:
              - interactive
              - auto
            default: interactive
          interaction_depth:
            type: string
            enum:
              - low
              - medium
              - high
            default: medium
          interactive:
            type: object
            additionalProperties: false
            properties:
              min_rounds:
                type: integer
                minimum: 1
                default: 3
              require_explicit_confirm:
                type: boolean
                default: true
            default:
              min_rounds: 3
              require_explicit_confirm: true
          discover:
            type: object
            additionalProperties: false
            properties:
              progressive:
                type: boolean
                default: true
              big_questions_first:
                type: boolean
                default: true
              plan_extend_mode:
                type: string
                enum:
                  - lightweight
                  - full
                default: lightweight
            default:
              progressive: true
              big_questions_first: true
              plan_extend_mode: lightweight
      version:
        type: string
        pattern: "^(7\\.1\\.0|8\\.0\\.0|8\\.1\\.0|8\\.2\\.0|8\\.3\\.0|8\\.4\\.0|10\\.0\\.1|10\\.0\\.2)$"
      created:
        type: string
        minLength: 1
      updated:
        type: string
        minLength: 1
type: object
additionalProperties: false
required:
  - pipeline
  - evaluation
properties:
  platform:
    type: string
    enum:
      - auto
      - claude
      - codex
    default: auto
    description: |
      指定目标平台。auto = 运行时检测。
      影响 Hook 可用性、Subagent 调用方式、指令文件位置。
  default_workflow_kind:
    type: string
    enum:
      - build
      - analysis
      - showcase
    default: build
    description: Project default only. Each Cycle may own its own workflow_kind.
  plan:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - auto
          - interactive
        default: interactive
      interaction_depth:
        type: string
        enum:
          - low
          - medium
          - high
        default: medium
      interactive:
        type: object
        additionalProperties: false
        properties:
          min_rounds:
            type: integer
            minimum: 1
            default: 3
          require_explicit_confirm:
            type: boolean
            default: true
        default:
          min_rounds: 3
          require_explicit_confirm: true
      discover:
        type: object
        additionalProperties: false
        properties:
          progressive:
            type: boolean
            default: true
          big_questions_first:
            type: boolean
            default: true
          plan_extend_mode:
            type: string
            enum:
              - lightweight
              - full
            default: lightweight
        default:
          progressive: true
          big_questions_first: true
          plan_extend_mode: lightweight
    default:
      mode: interactive
      interaction_depth: medium
      interactive:
        min_rounds: 3
        require_explicit_confirm: true
      discover:
        progressive: true
        big_questions_first: true
        plan_extend_mode: lightweight
  dashboard:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 7700
      auto_start:
        type: boolean
        default: false
      shutdown_delay:
        type: integer
        minimum: 0
        default: 30
    default:
      enabled: false
      port: 7700
      auto_start: false
      shutdown_delay: 30
  pipeline:
    type: object
    additionalProperties: false
    required:
      - name
      - source
      - output
    properties:
      name:
        type: string
        minLength: 1
        description: Human-readable pipeline name.
      source:
        type: string
        enum:
          - local
          - notion
        description: Prompt source adapter. V2.5 runtime guarantees local support.
      output:
        type: string
        enum:
          - local
          - notion
        description: Output adapter. V2.5 runtime guarantees local support.
      prompts_dir:
        type: string
        minLength: 1
        default: ".pipeline/prompts"
      reports_dir:
        type: string
        minLength: 1
        default: ".pipeline/reports"
      state_file:
        type: string
        minLength: 1
        default: ".pipeline/state.yaml"
      log_file:
        type: string
        minLength: 1
        default: ".pipeline/log.md"
  execution:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - self
          - subagent
        default: self
        description: Execution mode. V3 keeps self and subagent.
      subagent_tool:
        type: string
        enum:
          - codex
          - claude
          - auto
        default: auto
      analysis:
        $ref: "#/$defs/analysis_interaction"
        default:
          interaction_mode: hybrid
          boundaries:
            code_changes:
              manual: deny
              hybrid: confirm
              auto: allow
            restart_services: confirm
            install_system_dependencies: ask
            network_remote_resources:
              manual: ask
              hybrid: ask
              auto: allow
            destructive_or_external_side_effects: ask
      steps:
        type: object
        additionalProperties: false
        properties:
          preset:
            type: string
            enum:
              - tdd
              - implement-only
              - custom
              - analysis
            default: tdd
          sequence:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
        default:
          preset: tdd
      test_profiles:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: true
          selection:
            type: string
            enum:
              - auto
              - manual
            default: auto
          compose:
            type: boolean
            default: true
          profiles:
            type: array
            default: []
            items:
              type: string
              enum:
                - webapp
                - agent-service
                - research
        default:
          enabled: true
          selection: auto
          compose: true
          profiles: []
      step_overrides:
        type: object
        default: {}
        propertyNames:
          pattern: "^[A-Za-z0-9_-]+$"
        additionalProperties:
          type: object
          additionalProperties: false
          properties:
            enabled:
              type: boolean
              default: true
            reviewer:
              type: string
              enum:
                - self
                - subagent
              default: self
            executor:
              type: string
              enum:
                - self
                - subagent
              default: self
            subagent_tool:
              type: string
              enum:
                - codex
                - claude
                - auto
            subagent:
              type: string
              enum:
                - codex
                - claude
                - auto
            strict:
              type: boolean
              default: false
    default:
      mode: self
      subagent_tool: auto
      analysis:
        interaction_mode: hybrid
        boundaries:
          code_changes:
            manual: deny
            hybrid: confirm
            auto: allow
          restart_services: confirm
          install_system_dependencies: ask
          network_remote_resources:
            manual: ask
            hybrid: ask
            auto: allow
          destructive_or_external_side_effects: ask
      steps:
        preset: tdd
  output:
    type: object
    additionalProperties: false
    properties:
      language:
        type: string
        minLength: 1
        default: en
        description: Report and PROGRESS language. Use zh-CN for Chinese output.
      timezone:
        type: string
        minLength: 1
        default: Asia/Shanghai
        description: IANA timezone used for PROGRESS and report timestamps.
    default:
      language: zh-CN
      timezone: Asia/Shanghai
  model_pool:
    $ref: "#/$defs/model_pool_config"
  acceptance:
    $ref: "#/$defs/acceptance_config"
  release:
    type: object
    additionalProperties: false
    properties:
      readme:
        type: object
        additionalProperties: false
        properties:
          mode:
            type: string
            enum:
              - loose
              - strict
            default: loose
          full_regen:
            type: string
            enum:
              - auto
              - ask
              - deny
            default: auto
        default:
          mode: loose
          full_regen: auto
    default:
      readme:
        mode: loose
        full_regen: auto
  batch:
    type: object
    additionalProperties: false
    properties:
      decompose_mode:
        type: string
        enum:
          - upfront
          - just_in_time
        default: upfront
      failure_policy:
        type: string
        enum:
          - stop
          - skip_defer
          - retry
        default: skip_defer
      auto_chain:
        type: boolean
        default: true
      default_gate:
        type: string
        enum:
          - auto
          - confirm
        default: auto
    default:
      decompose_mode: upfront
      failure_policy: skip_defer
      auto_chain: true
      default_gate: auto
  watchdog:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      interval:
        type: integer
        minimum: 1
        default: 300
      heartbeat_timeout:
        type: integer
        minimum: 1
        default: 300
      max_retries:
        type: integer
        minimum: 1
        default: 5
      max_consecutive_milestones:
        type: integer
        minimum: 1
        default: 10
      notify:
        type: boolean
        default: true
    default:
      enabled: false
      interval: 300
      heartbeat_timeout: 300
      max_retries: 5
      max_consecutive_milestones: 10
      notify: true
  history_import:
    type: object
    additionalProperties: false
    properties:
      split_method:
        type: string
        enum:
          - auto
          - tag
          - keyword
          - merge
          - time_gap
        default: auto
      time_gap_threshold:
        type: string
        pattern: "^[0-9]+[hmd]$"
        default: 24h
      max_milestones:
        type: integer
        minimum: 1
        maximum: 20
        default: 20
      keyword_patterns:
        type: array
        minItems: 1
        default:
          - 'feat\(M(\d+)\):'
          - 'M(\d+)-'
          - 'milestone-(\d+)'
        items:
          type: string
          minLength: 1
    default:
      split_method: auto
      time_gap_threshold: 24h
      max_milestones: 20
      keyword_patterns:
        - 'feat\(M(\d+)\):'
        - 'M(\d+)-'
        - 'milestone-(\d+)'
  compact:
    type: object
    additionalProperties: false
    properties:
      auto:
        type: boolean
        default: true
      progress_recent:
        type: integer
        minimum: 1
        default: 15
      state_history_full:
        type: integer
        minimum: 0
        default: 1
      log_recent:
        type: integer
        minimum: 1
        default: 20
      reports_summary_lines:
        type: integer
        minimum: 1
        default: 3
    default:
      auto: true
      progress_recent: 15
      state_history_full: 1
      log_recent: 20
      reports_summary_lines: 3
  knowledge:
    $ref: "#/$defs/knowledge_config"
  sync:
    $ref: "#/$defs/sync_config"
  showcase:
    type: object
    additionalProperties: false
    properties:
      language:
        type: string
        enum:
          - auto
          - zh
          - en
          - bilingual
        default: auto
      poster:
        type: object
        additionalProperties: false
        properties:
          api_key_env:
            type: string
            minLength: 1
            default: OPENAI_API_KEY
          size:
            type: string
            enum:
              - "1024x1024"
              - "1024x1536"
              - "1536x1024"
            default: "1024x1536"
          quality:
            type: string
            enum:
              - high
              - standard
            default: high
          style:
            type: string
            enum:
              - auto
              - minimal
              - tech
              - marketing
            default: auto
        default:
          api_key_env: OPENAI_API_KEY
          size: "1024x1536"
          quality: high
          style: auto
    default:
      language: auto
      poster:
        api_key_env: OPENAI_API_KEY
        size: "1024x1536"
        quality: high
        style: auto
  rules:
    type: object
    additionalProperties: false
    properties:
      extends:
        oneOf:
          - type: string
            minLength: 1
            default: recommended
          - type: array
            minItems: 1
            items:
              type: string
              minLength: 1
        default: recommended
      rules:
        type: object
        default: {}
        propertyNames:
          pattern: "^[a-z0-9][a-z0-9-]*$"
        additionalProperties:
          type: string
          enum:
            - off
            - warn
            - error
    default:
      extends: recommended
      rules: {}
  step_overrides:
    type: object
    default: {}
    propertyNames:
      pattern: "^[A-Za-z0-9_-]+$"
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          default: true
        reviewer:
          type: string
          enum:
            - self
            - subagent
          default: self
        executor:
          type: string
          enum:
            - self
            - subagent
          default: self
        subagent_tool:
          type: string
          enum:
            - codex
            - claude
            - auto
        subagent:
          type: string
          enum:
            - codex
            - claude
            - auto
        strict:
          type: boolean
          default: false
  hooks:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      stop_check:
        type: boolean
        default: true
      session_inject:
        type: boolean
        default: true
      instructions_monitor:
        type: boolean
        default: false
      claude:
        type: object
        additionalProperties: false
        properties:
          stop_block_mode:
            type: string
            enum:
              - strict
              - lenient
            default: strict
          compact_reinject:
            type: boolean
            default: true
      codex:
        type: object
        additionalProperties: false
        properties:
          notify_on_complete:
            type: boolean
            default: true
          agents_md_discipline:
            type: boolean
            default: true
  evaluation:
    type: object
    additionalProperties: false
    properties:
      auto_continue:
        type: boolean
        default: false
      max_diff_score:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
      adaptive_threshold:
        type: boolean
        default: false
      base_max_diff_score:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
      checks:
        type: array
        default:
          - tests_pass
          - no_regressions
          - matches_plan
          - code_quality
        uniqueItems: true
        items:
          type: string
          enum:
            - tests_pass
            - no_regressions
            - matches_plan
            - code_quality
            - question_addressed
            - evidence_complete
            - conclusion_traceable
            - experiment_executed
            - change_validated
            - followup_recorded
      weights:
        type: object
        description: 可自定义各维度权重，默认使用内置公式
        additionalProperties: false
        properties:
          diff_score:
            type: number
          code_quality:
            type: number
          test_coverage:
            type: number
          complexity:
            type: number
          architecture_drift:
            type: number
  opencode:
    type: object
    additionalProperties: false
    properties:
      auto_continue:
        type: boolean
        default: true
      profile:
        type: string
        minLength: 1
        default: standard
      providers:
        type: object
        additionalProperties:
          $ref: "#/$defs/opencode_provider"
      compaction:
        type: object
        additionalProperties: false
        properties:
          effective_context_target:
            type: integer
            minimum: 1
            default: 900000
        default:
          effective_context_target: 900000
      agents:
        type: object
        additionalProperties: false
        properties:
          plan:
            $ref: "#/$defs/opencode_agent_model"
          compact:
            $ref: "#/$defs/opencode_agent_model"
          test:
            $ref: "#/$defs/opencode_agent_model"
          code-a:
            $ref: "#/$defs/opencode_agent_model"
          code-b:
            $ref: "#/$defs/opencode_agent_model"
          debug:
            $ref: "#/$defs/opencode_agent_model"
          docs:
            $ref: "#/$defs/opencode_agent_model"
          report:
            $ref: "#/$defs/opencode_agent_model"
        default:
          plan:
            model: gpt-5.5
          compact:
            model: deepseek-v4-flash
          test:
            model: deepseek-v4-pro
          code-a:
            model: mimo-v2.5-pro
          code-b:
            model: deepseek-v4-pro
          debug:
            model: gpt-5.5
          docs:
            model: deepseek-v4-pro
          report:
            model: deepseek-v4-flash
  claude_code:
    $ref: "#/$defs/claude_code_config"
  notion:
    type: object
    additionalProperties: false
    properties:
      token_file:
        type: string
        minLength: 1
        description: Path to a file containing the Notion integration token.
      source_database_id:
        type: string
        minLength: 1
      source_page_id:
        type: string
        minLength: 1
      output_parent_page_id:
        type: string
        minLength: 1
      output_database_id:
        type: string
        minLength: 1
      report_title_prefix:
        type: string
        minLength: 1
      api_base_url:
        type: string
        minLength: 1
        default: "https://api.notion.com/v1"
      notion_version:
        type: string
        minLength: 1
        default: "2022-06-28"
allOf:
  - if:
      properties:
        execution:
          properties:
            steps:
              properties:
                preset:
                  const: custom
              required:
                - preset
          required:
            - steps
      required:
        - execution
    then:
      properties:
        execution:
          properties:
            steps:
              required:
                - sequence
  - if:
      properties:
        pipeline:
          properties:
            source:
              const: notion
      required:
        - pipeline
    then:
      properties:
        notion:
          anyOf:
            - required:
                - source_database_id
            - required:
                - source_page_id
  - if:
      properties:
        pipeline:
          properties:
            output:
              const: notion
      required:
        - pipeline
    then:
      properties:
        notion:
          anyOf:
            - required:
                - output_parent_page_id
            - required:
                - output_database_id
