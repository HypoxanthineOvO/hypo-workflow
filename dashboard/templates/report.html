<ul class="report-list">
  {% for report_name in reports %}
    <li>
      <a href="#report-view"
         hx-get="/api/reports/{{ report_name }}"
         hx-target="#report-view"
         hx-swap="innerHTML">{{ report_name }}</a>
    </li>
  {% else %}
    <li>No reports yet.</li>
  {% endfor %}
</ul>
<div id="report-view" class="report-view">Select a report to render its Markdown.</div>
