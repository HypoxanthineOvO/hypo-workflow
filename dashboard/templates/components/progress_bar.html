<div class="progress-shell">
  <div class="summary-row">
    <span class="badge {{ summary.status }}">{{ status_icon(summary.status) }} {{ status_label(summary.status) }}</span>
    <span class="badge">{{ summary.phase }}</span>
    <span class="badge">{{ summary.current_prompt }}</span>
    <span class="badge">{{ summary.current_step }}</span>
  </div>
  <div class="progress-track">
    <div id="progress-fill" class="progress-fill" style="width: {{ summary.percent }}%;"></div>
  </div>
  <div id="progress-copy" class="progress-copy">{{ summary.done }}/{{ summary.total }} milestones ({{ summary.percent }}%)</div>
</div>
