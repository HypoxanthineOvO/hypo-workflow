name: karpathy-think-before-coding
label: guideline
description: Declare assumptions, list ambiguous interpretations, simplify when possible, and ask when still uncertain.
default_severity: off
pack_default_severity: warn
hooks:
  - always
check: |
  Think Before Coding: state the current assumptions first, surface ambiguous
  interpretations instead of guessing, and stop to ask the user when uncertainty
  would materially change the plan or implementation.
