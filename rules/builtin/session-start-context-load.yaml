name: session-start-context-load
label: hook
description: Preserve SessionStart context loading as a rule-level gate.
default_severity: error
hooks:
  - on-session-start
check: |
  On session start, resume, clear, or compact, load the pipeline summary and priority context files.
  Prefer compact context views when available and fall back to full files.
  Load Knowledge Ledger knowledge compact and category indexes, but never raw records by default.
  Inject active always rules into the session context.
