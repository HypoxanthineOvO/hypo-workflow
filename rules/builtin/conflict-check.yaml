name: conflict-check
label: guard
description: Detect incompatible local agent plugins or hook systems at session start.
default_severity: warn
hooks:
  - on-session-start
check: |
  Inspect known plugin and hook directories for conflicting automation that can intercept stop or session-start behavior.
  Trigger when another plugin appears to install incompatible stop/session hooks for the same workspace.
  Report the conflicting path and ask the user which integration should own the hook.
