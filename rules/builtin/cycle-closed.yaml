name: cycle-closed
label: guard
description: Check that the previous explicit Cycle was closed before starting a new delivery lane.
default_severity: warn
hooks:
  - pre-milestone
check: |
  Inspect `.pipeline/cycle.yaml` and `.pipeline/archives/`.
  Trigger when stale active Cycle metadata conflicts with the requested execution.
  Recommend `/hw:cycle close` or `/hw:cycle new` as appropriate.
