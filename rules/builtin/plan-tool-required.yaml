name: plan-tool-required
label: workflow
description: Complex planning and execution work must maintain a visible plan/todo state.
default_severity: warn
hooks:
  - always
  - pre-milestone
check: |
  For complex tasks, the Agent should maintain an explicit plan using the host
  platform's available plan tool. On OpenCode, use todowrite. On Codex, use the
  available update_plan/tool discipline when present. On Claude Code, maintain
  the plan in the conversation or configured planning surface.

  P1/P2/P3/P4 planning checkpoints must be reflected before moving on.
