name: stop-hook-self-check
label: hook
description: Preserve the Stop Hook self-check as a rule-level gate.
default_severity: error
hooks:
  - post-step
check: |
  Before the agent stops during an active pipeline, inspect state and expected reports.
  If the current step or required report is incomplete, block stopping and provide the next concrete action.
  This wraps the existing Claude Stop Hook behavior as a rule.
