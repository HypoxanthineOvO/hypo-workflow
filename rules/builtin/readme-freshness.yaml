name: readme-freshness
label: release
description: Ensure README managed content matches version, command count, platform matrix, features, and release policy before publishing.
default_severity: warn
hooks:
  - pre-commit
  - pre-release
check: |
  Read `templates/readme-spec.md` and compare `README.md` against structured
  project assets. Check version metadata, command count, OpenCode command map,
  platform matrix, Skill inventory wording, and release/update_readme summary.
  In strict mode, block release when README managed content is stale.
