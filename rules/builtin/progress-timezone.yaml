name: progress-timezone
label: style
description: Keep PROGRESS timestamps aligned with output.timezone.
default_severity: warn
hooks:
  - always
check: |
  Read effective `output.timezone` from project config, then global config, then defaults.
  Format same-day PROGRESS entries as `HH:MM`; use `DD日 HH:MM` for cross-day entries in Chinese output.
  Do not mix local shell timezone assumptions with configured timezone output.
