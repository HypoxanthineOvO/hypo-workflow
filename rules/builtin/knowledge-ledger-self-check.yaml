name: knowledge-ledger-self-check
label: hook
description: Require a Knowledge Ledger self-check after work that changes reusable project knowledge.
default_severity: warn
hooks:
  - post-step
  - post-milestone
check: |
  When a milestone, patch, release, sync, or explore session materially changes reusable project knowledge,
  the agent should write a redacted Knowledge Ledger record and rebuild generated indexes/compact context.
  Warn by default; in strict mode, block final stop until a record exists or the rule is downgraded.
