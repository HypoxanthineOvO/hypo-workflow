name: skill-quality
label: quality
description: Validate Skill frontmatter, canonical output-language heading, reference paths, command map traceability, and internal Skill exceptions.
default_severity: warn
hooks:
  - pre-milestone
  - pre-release
check: |
  Run the Skill quality checker over `skills/*/SKILL.md` and the canonical command map.
  Trigger when a Skill is missing frontmatter, misses `## Output Language Rules`,
  references a missing file, or when command-map/internal-Skill invariants break.
  `skills/watchdog/SKILL.md` is allowed as an internal cron-only exception.
