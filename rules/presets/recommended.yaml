name: recommended
description: Recommended defaults for most Hypo-Workflow projects.
rules:
  git-clean-check: warn
  config-valid: warn
  cycle-closed: warn
  conflict-check: warn
  report-language: warn
  progress-timezone: warn
  progress-verbosity: off
  commit-format: off
  auto-continue-threshold: warn
  plan-tool-required: warn
  knowledge-ledger-self-check: warn
  review-strictness: warn
  readme-freshness: warn
  skill-quality: warn
  stop-hook-self-check: error
  session-start-context-load: error
