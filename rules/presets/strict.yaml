name: strict
description: Strict defaults for teams that prefer hard gates.
rules:
  git-clean-check: error
  config-valid: error
  cycle-closed: error
  conflict-check: error
  report-language: warn
  progress-timezone: warn
  progress-verbosity: warn
  commit-format: error
  auto-continue-threshold: error
  plan-tool-required: error
  review-strictness: error
  readme-freshness: error
  skill-quality: error
  stop-hook-self-check: error
  session-start-context-load: error
