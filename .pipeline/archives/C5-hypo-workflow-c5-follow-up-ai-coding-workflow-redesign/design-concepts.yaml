schema_version: "1"
artifact: design-concepts
owner: plan-discover
concepts:
  - id: guide-router
    term: Guide Router
    definition: "A project-aware route recommender that senses lifecycle state and user intent, then recommends exactly one next command path."
    boundaries:
      - "It is not a runner."
      - "It does not mutate protected workflow state."
      - "It starts only the first recommended command after confirmation."
    source_of_truth:
      - "skills/guide/SKILL.md"
      - "references/commands-spec.md"
      - "core/src/guide/index.js"
    state_transitions:
      - "sense state -> classify intent -> recommend one route -> confirm -> execute first command"
    decision_refs:
      - "D-20260503-05"
      - "D-20260503-10"
    prompt_hints:
      - "Generated guide prompts should include lifecycle phase, next action, dirty worktree, derived refresh, lease, and open patch context."
  - id: adaptive-grill-me
    term: Adaptive Grill-Me
    definition: "A Discover escalation mode that aligns design concepts only when task risk warrants deeper questioning."
    boundaries:
      - "Low-risk patches and small incremental tasks stay in light Discover."
      - "Raw conversation is not authoritative until confirmed decisions or concepts are extracted."
    source_of_truth:
      - "skills/plan-discover/SKILL.md"
      - "references/progressive-discover-spec.md"
      - "core/src/guide/index.js"
    state_transitions:
      - "big questions -> risk decision -> light Discover or deep Grill-Me -> confirmed concept extraction"
    decision_refs:
      - "D-20260503-05"
      - "D-20260503-06"
    prompt_hints:
      - "Use deep Grill-Me for architecture, workflow semantics, source-of-truth, product concept, or long-running coordination risk."
  - id: design-artifact-layering
    term: Design Artifact Layering
    definition: "A separation of transient discussion, confirmed decisions, glossary/design concepts, architecture, prompt inputs, and Knowledge Ledger indexes."
    boundaries:
      - "Do not introduce a monolithic repo-root CONTEXT.md."
      - "Do not copy full glossary or design-concepts bodies into every compact context."
    source_of_truth:
      - ".pipeline/design-concepts.yaml"
      - ".pipeline/glossary.md"
      - ".pipeline/architecture.md"
      - ".pipeline/knowledge/index/decisions.yaml"
    state_transitions:
      - "discussion -> decision record -> concept/glossary -> architecture -> prompt input -> knowledge index"
    decision_refs:
      - "D-20260503-06"
    prompt_hints:
      - "Generated prompts should consume executable subsets: goals, boundaries, non-goals, tests, impact surface, and validation evidence."
layering:
  transient_discussion: "conversation only until confirmed"
  durable_decisions: ".pipeline/knowledge/records/*.yaml and .pipeline/knowledge/index/decisions.yaml"
  glossary: ".pipeline/glossary.md"
  architecture: ".pipeline/architecture.md"
  prompt_inputs: ".pipeline/prompts/*.md"
