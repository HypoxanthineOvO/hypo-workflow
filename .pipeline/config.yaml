pipeline:
  name: "Hypo-Workflow C4 Knowledge Ledger, Global TUI, Acceptance Loop, and Explore Mode"
  source: local
  output: local
  prompts_dir: .pipeline/prompts
  reports_dir: .pipeline/reports

plan:
  mode: interactive
  interaction_depth: high
  interactive:
    min_rounds: 5
    require_explicit_confirm: true

execution:
  mode: self
  steps:
    preset: tdd

batch:
  decompose_mode: upfront
  failure_policy: skip_defer
  auto_chain: true
  default_gate: auto

evaluation:
  auto_continue: true
  max_diff_score: 3
  checks:
    - tests_pass
    - no_regressions
    - matches_plan
    - code_quality

output:
  language: zh-CN
  timezone: Asia/Shanghai
