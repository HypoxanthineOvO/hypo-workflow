pipeline:
  name: "Hypo-Workflow V5 Self-Bootstrap"
  source: local
  output: local
  prompts_dir: .pipeline/prompts
  reports_dir: .pipeline/reports

execution:
  mode: self
  steps:
    preset: implement-only

evaluation:
  auto_continue: false
  max_diff_score: 3
  checks:
    - matches_plan
    - code_quality
