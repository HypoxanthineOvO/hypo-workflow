summary: Claude Code / OpenCode / Codex interface map for adapter planning
details:
  dependencies:
    -
      name: Claude Code hooks
      reason: event-driven shell hooks cover PreToolUse, PostToolUse, UserPromptSubmit, Notification, Stop, SubagentStop, PreCompact, SessionStart, and SessionEnd.
    -
      name: Claude Code plugins
      reason: plugins can package skills, agents, hooks, MCP servers, LSP servers, and monitors under a .claude-plugin manifest.
    -
      name: OpenCode plugins and commands
      reason: project/global plugins plus TUI command files provide the primary extension surface for behavior, custom tools, and repeatable actions.
    -
      name: Codex use cases
      reason: official guidance emphasizes composable CLI commands and reusable skills as the main repeatable-work surface.
  references:
    -
      title: Claude Code plugins
      url: "https://code.claude.com/docs/en/plugins"
      note: official plugin structure and skill/agent/hook/MCP surface
    -
      title: Claude Code plugins reference
      url: "https://code.claude.com/docs/en/plugins-reference"
      note: technical component specification and validation guidance
    -
      title: Claude Code hooks reference
      url: "https://docs.anthropic.com/en/docs/claude-code/hooks"
      note: hook events, input schema, output contracts, and CLAUDE_PROJECT_DIR
    -
      title: Claude Code hooks quickstart
      url: "https://docs.anthropic.com/en/docs/claude-code/hooks-guide"
      note: deterministic shell hook workflow and security considerations
    -
      title: OpenCode plugins
      url: "https://opencode.ai/docs/plugins/"
      note: local/npm plugin loading, load order, events, and compaction hooks
    -
      title: OpenCode commands
      url: "https://opencode.ai/docs/commands/"
      note: file-based custom command surface for the TUI
    -
      title: OpenCode TUI
      url: "https://opencode.ai/docs/tui/"
      note: slash-command entry surface for interactive work
    -
      title: Codex use cases
      url: "https://developers.openai.com/codex/use-cases/"
      note: composable CLI commands and saved workflows-as-skills
  decisions:
    -
      title: Seed Knowledge with an interface map first
      rationale: keeps follow-up planning fast without duplicating full docs.
    -
      title: Treat UI/status surfaces as adapter-specific rather than core-neutral
      rationale: Claude Code, OpenCode, and Codex expose different extension points and UI affordances.
    -
      title: Model Codex as commands and skills plus workflow guidance
      rationale: the official docs emphasize composable CLI commands and reusable skills more than a hook-first plugin stack.
  pitfalls:
    -
      issue: Claude Code hook outputs are event-sensitive and exit-code-sensitive.
      prevention: branch behavior by event and respect the documented stdout/stderr and blocking contracts.
    -
      issue: Claude Code plugin structure requires a plugin.json manifest in .claude-plugin and component folders at the plugin root.
      prevention: keep the manifest and component directories separate when scaffolding a plugin.
    -
      issue: OpenCode plugin load order mixes global config, project config, and plugin directories.
      prevention: make adapter selection explicit and verify load order in tests.
    -
      issue: Codex docs can tempt a false hook-plugin analogy.
      prevention: treat Codex primarily as a workflow/skill command surface unless a concrete hook system is verified in current docs.
  config-notes:
    -
      key: claude_code.settings.paths
      value: ~/.claude/settings.json,.claude/settings.json,.claude/settings.local.json
      reason: hook registration lives in settings files, not only in plugin manifests.
    -
      key: claude_code.hooks.env
      value: CLAUDE_PROJECT_DIR
      reason: hooks can reference project scripts portably.
    -
      key: opencode.plugin.paths
      value: .opencode/plugins/; ~/.config/opencode/plugins/
      reason: project and global plugins auto-load.
    -
      key: opencode.command.paths
      value: .opencode/commands/
      reason: custom commands are file-based and surface in the TUI.
    -
      key: codex.workflow.entrypoints
      value: CLI commands; saved skills
      reason: official docs call out composable commands and reusable skills.
