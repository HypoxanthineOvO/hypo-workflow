    summary: Claude Code / OpenCode / Codex interface map for adapter planning
    tags:
      - claude-code
      - opencode
      - codex
      - hooks
      - plugins
      - commands
      - ui
      - adapter
    refs:
      files:
        - references/knowledge-spec.md
        - references/opencode-spec.md
        - references/commands-spec.md
      urls:
        - "https://code.claude.com/docs/en/plugins"
        - "https://code.claude.com/docs/en/plugins-reference"
        - "https://docs.anthropic.com/en/docs/claude-code/hooks"
        - "https://docs.anthropic.com/en/docs/claude-code/hooks-guide"
        - "https://opencode.ai/docs/plugins/"
        - "https://opencode.ai/docs/commands/"
        - "https://opencode.ai/docs/tui/"
        - "https://developers.openai.com/codex/use-cases/"
    items:
      -
        issue: Claude Code hook outputs are event-sensitive and exit-code-sensitive.
        prevention: branch behavior by event and respect the documented stdout/stderr and blocking contracts.
      -
        issue: Claude Code plugin structure requires a plugin.json manifest in .claude-plugin and component folders at the plugin root.
        prevention: keep the manifest and component directories separate when scaffolding a plugin.
      -
        issue: OpenCode plugin load order mixes global config, project config, and plugin directories.
        prevention: make adapter selection explicit and verify load order in tests.
      -
        issue: Codex docs can tempt a false hook-plugin analogy.
        prevention: treat Codex primarily as a workflow/skill command surface unless a concrete hook system is verified in current docs.
