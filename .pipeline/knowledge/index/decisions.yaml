    items:
      -
        title: Seed Knowledge with an interface map first
        rationale: keeps follow-up planning fast without duplicating full docs.
      -
        title: Treat UI/status surfaces as adapter-specific rather than core-neutral
        rationale: Claude Code, OpenCode, and Codex expose different extension points and UI affordances.
      -
        title: Model Codex as commands and skills plus workflow guidance
        rationale: the official docs emphasize composable CLI commands and reusable skills more than a hook-first plugin stack.
